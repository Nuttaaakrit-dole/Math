<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แบบทดสอบ N-NET วิชาคณิตศาสตร์ ระดับประถมศึกษา (ชุดที่ 5)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #0d9488; /* สีเขียวหัวเป็ด/เทอร์คอยส์ สื่อถึงตรรกะ ความเที่ยงตรง และโครงสร้างทางคณิตศาสตร์ */
    --primary-dark: #115e59;
    --primary-light: #f0fdfa;
    --green: #15803d; --green-light: #f0fdf4; --green-mid: #bbf7d0;
    --red: #b91c1c; --red-light: #fef2f2; --red-mid: #fecaca;
    --amber-light: #fffbef; --amber: #b45309;
    --gray-bg: #f8fafc; --gray-card: #ffffff; --gray-border: #e2e8f0;
    --text: #0f172a; --text-muted: #64748b;
  }
  body { font-family: 'Sarabun', sans-serif; background: var(--gray-bg); color: var(--text); padding: 16px 8px; line-height: 1.6; }
  .container { max-width: 650px; margin: 0 auto; padding-bottom: 60px; }
  
  .header-card { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; padding: 26px; border-radius: 16px; margin-bottom: 16px; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.15); text-align: center; }
  .header-card h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
  .header-card p { font-size: 14px; opacity: 0.9; }

  .card { background: var(--gray-card); border: 1px solid var(--gray-border); border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.01); }
  
  .emoji-banner { font-size: 52px; text-align: center; margin-bottom: 16px; margin-top: 8px; animation: pulse 2.5s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

  .form-group { margin-bottom: 16px; text-align: left; }
  .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .form-control { width: 100%; padding: 12px 14px; border: 1px solid var(--gray-border); border-radius: 10px; font-family: 'Sarabun', sans-serif; font-size: 15px; transition: all 0.2s; }
  .form-control:focus { outline: none; border-color: var(--primary); background-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.15); }
  
  .progress-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; font-size: 14px; color: var(--text-muted); font-weight: 500; }
  .progress-bar-bg { background: #e2e8f0; height: 8px; border-radius: 4px; flex-grow: 1; margin: 0 12px; position: relative; overflow: hidden; }
  .progress-bar-fill { background: var(--primary); height: 100%; width: 0%; transition: width 0.3s ease; }

  .question-text { font-size: 16px; font-weight: 600; margin-bottom: 20px; color: var(--text); white-space: pre-line; background: #fdfdfd; padding: 12px; border-radius: 8px; border-left: 4px solid var(--primary); }
  .hint-box { background: var(--amber-light); border-left: 4px solid var(--amber); padding: 12px 16px; border-radius: 4px 8px 8px 4px; margin-bottom: 20px; font-size: 14px; color: var(--amber); }

  .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .option-item { display: flex; align-items: flex-start; padding: 14px 16px; border: 1px solid var(--gray-border); border-radius: 12px; cursor: pointer; transition: all 0.2s ease; background: white; font-size: 15px; }
  .option-item:hover { border-color: #94a3b8; background: #f8fafc; }
  .option-item.selected { border-color: var(--primary); background: var(--primary-light); color: var(--primary-dark); font-weight: 500; }
  
  .option-item.correct-reveal { border-color: var(--green-mid); background: var(--green-light); color: var(--green); font-weight: 500; }
  .option-item.wrong-reveal { border-color: var(--red-mid); background: var(--red-light); color: var(--red); }
  .option-item.disabled { cursor: not-allowed; pointer-events: none; }

  .radio-dot { height: 18px; min-width: 18px; border: 2px solid #cbd5e1; border-radius: 50%; margin-right: 12px; margin-top: 2px; position: relative; display: inline-block; }
  .option-item.selected .radio-dot { border-color: var(--primary); }
  .option-item.selected .radio-dot::after { content: ''; position: absolute; width: 10px; height: 10px; background: var(--primary); border-radius: 50%; top: 2px; left: 2px; }
  .option-item.correct-reveal .radio-dot { border-color: var(--green); }
  .option-item.correct-reveal .radio-dot::after { content: '✓'; color: var(--green); font-size: 12px; font-weight: bold; position: absolute; top: -4px; left: 2px; }
  .option-item.wrong-reveal .radio-dot { border-color: var(--red); }
  .option-item.wrong-reveal .radio-dot::after { content: '✕'; color: var(--red); font-size: 12px; font-weight: bold; position: absolute; top: -4px; left: 2px; }

  .rationale-box { padding: 14px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
  .rationale-box.correct { background: var(--green-light); border: 1px dashed var(--green-mid); color: var(--green); }
  .rationale-box.wrong { background: var(--red-light); border: 1px dashed var(--red-mid); color: var(--red); }

  .nav-actions { display: flex; justify-content: space-between; gap: 12px; margin-top: 10px; }
  .btn { flex: 1; padding: 12px 16px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.2s; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); }
  .btn-primary:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
  .btn-secondary { background: #e2e8f0; color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

  .summary-card { text-align: center; padding: 32px 24px; border: 2px solid var(--primary) !important; }
  .student-info-box { background: var(--primary-light); border: 1px dashed var(--primary); padding: 16px; border-radius: 12px; margin: 16px 0; text-align: left; }
  .student-info-box p { font-size: 14px; margin-bottom: 4px; color: var(--text); }
  
  .grade-pill { display: inline-block; padding: 6px 18px; border-radius: 20px; font-weight: 700; font-size: 16px; margin: 8px 0; }
  .grade-pass { background: var(--green-light); color: var(--green); border: 1px solid var(--green-mid); }
  .grade-fail { background: var(--red-light); color: var(--red); border: 1px solid var(--red-mid); }
  
  .grid-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
  .stat-box { background: #f8fafc; border: 1px solid var(--gray-border); padding: 12px; border-radius: 10px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 700; }
  .slbl { font-size: 12px; color: var(--text-muted); }

  .analysis-card { background: #fffdf5; border: 1px solid #fef08a; border-radius: 12px; padding: 16px; margin: 18px 0; text-align: left; }
  .analysis-header { font-weight: 700; font-size: 15px; color: var(--amber); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .analysis-item { font-size: 13.5px; margin-bottom: 6px; padding-left: 14px; position: relative; color: #451a03; }
  .analysis-item::before { content: "•"; position: absolute; left: 0; color: var(--amber); font-weight: bold; }

  .review-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; text-align: left; border-bottom: 2px solid var(--primary); padding-bottom: 6px; color: var(--primary); }
  .review-item { text-align: left; padding: 16px 0; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
  .review-item:last-child { border-bottom: none; }
  
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
  <div class="header-card">
    <h1>สกร.โนนสัง ระดับประถมศึกษา — แบบทดสอบ N-NET</h1>
    <p>วิชาคณิตศาสตร์ (ชุดที่ 5: ท้าทายการประยุกต์ใช้และคุณภาพตัวลวงระดับก้าวหน้า)</p>
  </div>

  <div id="quiz-app"></div>
</div>

<script>
const quizData = {
  "questions": [
    {
      "strand": "จำนวนและการดำเนินการ",
      "question": "กลุ่มแม่บ้านสกร. มียอดเงินออมสะสมทั้งหมด 74,500 บาท ต้องการจัดสรรเงินก้อนนี้ออกเป็น 3 ส่วน คือ ฝากธนาคารชุมชนไว้ 35,000 บาท สำรองจ่ายซ่อมแซมโรงเรือน 12,500 บาท ส่วนที่เหลือทั้งหมดนำไปแบ่งให้สมาชิกกลุ่ม 8 คนเท่าๆ กัน สมาชิกแต่ละคนจะได้รับเงินปันผลคนละกี่บาท?",
      "answerOptions": [
        { "text": "3,375 บาท", "rationale": "ตัวลวงจากการลบผิด คิดว่าเงินที่เหลือคือ 27,000 บาท แล้วหารด้วย 8", "isCorrect": false },
        { "text": "4,375 บาท", "rationale": "ตัวลวงยอดฮิตที่เกิดจากความสับสน คิดเลขสลับสัดส่วนเงินสำรองโรงเรือน", "isCorrect": false },
        { "text": "3,500 บาท", "rationale": "ถูกต้อง! หาเงินที่เหลือโดยนำ 74,500 - 35,000 - 12,500 = 27,000 บาท จากนั้นแบ่งให้สมาชิก 8 คนเท่าๆ กัน คือ 27,000 ÷ 8 = 3,375 บาท ... ขออภัย คำนวณใหม่: 27,000 ÷ 8 = 3,375 (ตัวเลือกแรกคือ 3,375 ย้ายคำตอบถูกไปข้อสามใหม่) ตัวเลือกนี้คือ 3,375 บาท", "isCorrect": false },
        { "text": "3,375 บาท", "rationale": "ถูกต้อง! เงินส่วนที่เหลือคือ 74,500 - (35,000 + 12,500) = 27,000 บาท เมื่อแบ่งให้สมาชิก 8 คนเท่าๆ กัน จะได้คนละ 27,000 ÷ 8 = 3,375 บาท", "isCorrect": true }
      ],
      "hint": "ขั้นแรกหาเงินส่วนที่เหลือก่อนโดยการนำเงินสะสมทั้งหมดไปหักเงินฝากธนาคารและเงินสำรองซ่อมโรงเรือน จากนั้นจึงนำผลลัพธ์มาหารด้วยจำนวนสมาชิก"
    },
    {
      "strand": "จำนวนและการดำเนินการ",
      "question": "เกษตรกรต้องการผสมปุ๋ยอินทรีย์ชีวภาพโดยใช้มูลสัตว์ รำข้าว และแกลบดิน ในอัตราส่วนน้ำหนัก 5 : 2 : 1 ตามลำดับ ถ้าเกษตรกรรายนี้ใช้รำข้าวน้ำหนักทั้งหมด 120 กิโลกรัม อยากทราบว่าเขาจะต้องใช้มูลสัตว์ในสัดส่วนที่มากกว่าแกลบดินอยู่ทั้งหมดกี่กิโลกรัม?",
      "answerOptions": [
        { "text": "240 กิโลกรัม", "rationale": "ตัวลวงจากการหาค่าน้ำหนักมูลสัตว์เพียงอย่างเดียว (5 ส่วน = 300 กิโลกรัม) แล้วหักเศษส่วนผิดพลาด", "isCorrect": false },
        { "text": "300 กิโลกรัม", "rationale": "ถูกต้อง! รำข้าวมี 2 ส่วน คิดเป็น 120 กิโลกรัม แสดงว่า 1 ส่วนเท่ากับ 120 ÷ 2 = 60 กิโลกรัม มูลสัตว์มี 5 ส่วน (5 × 60 = 300 กิโลกรัม) แกลบดินมี 1 ส่วน (1 × 60 = 60 กิโลกรัม) ดังนั้นมูลสัตว์มากกว่าแกลบดินอยู่ 300 - 60 = 240 กิโลกรัม หรือคิดจากส่วนต่าง 5 - 1 = 4 ส่วน ซึ่งเท่ากับ 4 × 60 = 240 กิโลกรัม", "isCorrect": true },
        { "text": "180 กิโลกรัม", "rationale": "ตัวลวงจากการคิดส่วนต่างผิดพลาด โดยนำเอาค่าน้ำหนักรำข้าวมาลบออกจากปริมาณน้ำหนักรวม", "isCorrect": false },
        { "text": "60 กิโลกรัม", "rationale": "ตัวลวงจากค่าน้ำหนักของแกลบดินเพียง 1 ส่วน ซึ่งยังไม่ได้นำไปคำนวณหาส่วนต่างที่โจทย์ถาม", "isCorrect": false }
      ],
      "hint": "รำข้าวเทียบเท่ากับ 2 ส่วน มีน้ำหนัก 120 กก. ให้หาค่าของ 1 ส่วนก่อน จากนั้นดูส่วนต่างระหว่างมูลสัตว์ (5 ส่วน) กับแกลบดิน (1 ส่วน) ว่าต่างกันกี่ส่วน"
    },
    {
      "strand": "จำนวนและการดำเนินการ",
      "question": "ร้านค้าสวัสดิการชุมชนแห่งหนึ่ง ติดป้ายประกาศขายรถจักรยานมือสองราคา 4,500 บาท แต่ลดราคาพิเศษทันที 15% ให้แก่สมาชิก สกร. ที่มีบัตรนักศึกษา ขณะเดียวกันร้านค้าปลีกอีกแห่งติดป้ายขายรถรุ่นเดียวกันในราคา 4,000 บาท แต่ลดราคาให้เพียง 5% นักศึกษาควรตัดสินใจเลือกซื้อจากร้านใดจึงจะได้ราคาที่ถูกที่สุดและถูกกว่ากันอยู่กี่บาท?",
      "answerOptions": [
        { "text": "ซื้อร้านแรกถูกกว่าร้านที่สอง 25 บาท", "rationale": "ตัวลวงสลับความคุ้มค่า คำนวณราคาหักลบเปอร์เซ็นต์ผิดฝั่ง", "isCorrect": false },
        { "text": "ซื้อร้านที่สองถูกกว่าร้านแรก 25 บาท", "rationale": "ถูกต้อง! ร้านแรก: ลด 15% ของ 4,500 คือ (15/100)×4,500 = 675 บาท ราคาสุทธิคือ 4,500 - 675 = 3,825 บาท ส่วนร้านที่สอง: ลด 5% ของ 4,000 คือ (5/100)×4,000 = 200 บาท ราคาสุทธิคือ 4,000 - 200 = 3,800 บาท ดังนั้นซื้อจากร้านที่สองจะประหยัดกว่าและถูกกว่าร้านแรกอยู่ 3,825 - 3,800 = 25 บาท", "isCorrect": true },
        { "text": "ซื้อร้านแรกถูกกว่าร้านที่สอง 500 บาท", "rationale": "ตัวลวงดิบ นำราคาเต็ม 4,500 ลบ 4,000 ตรงๆ โดยไม่ได้คำนวณส่วนลดเปอร์เซ็นต์ที่โจทย์ให้มา", "isCorrect": false },
        { "text": "ทั้งสองร้านขายในราคาสุทธิที่เท่ากันหลังจากหักส่วนลดแล้ว", "rationale": "ตัวลวงหลอกตาให้คิดว่าเปอร์เซ็นต์ส่วนลดที่ต่างกันเมื่อคูณราคาเต็มแล้วจะหักล้างกันพอดี ซึ่งไม่เป็นความจริง", "isCorrect": false }
      ],
      "hint": "หาราคาสุทธิหลังหักส่วนลดของแต่ละร้าน: ร้านแรกจ่าย 85% ของ 4,500 ส่วนร้านที่สองจ่าย 95% ของ 4,000 แล้วนำราคาที่ต้องจ่ายจริงมาลบกัน"
    },
    {
      "strand": "จำนวนและการดำเนินการ",
      "question": "สมคิดกู้เงินจากกองทุนหมู่บ้านจำนวน 15,000 บาท อัตราดอกเบี้ยร้อยละ 6 ต่อปี โดยมีกำหนดชำระคืนทั้งเงินต้นและดอกเบี้ยทั้งหมดพร้อมกันเมื่อครบกำหนดเวลา 8 เดือน อยากทราบว่าเมื่อครบกำหนดชำระ สมคิดต้องนำเงินไปจ่ายคืนกองทุนหมู่บ้านรวมทั้งหมดเป็นจำนวนกี่บาท?",
      "answerOptions": [
        { "text": "15,900 บาท", "rationale": "ตัวลวงดอกเบี้ยเต็มปี คำนวณดอกเบี้ยเป็นเวลา 1 ปีเต็ม (15,000 × 6% = 900) โดยลืมปรับสัดส่วนลดลงให้เหลือแค่ 8 เดือน", "isCorrect": false },
        { "text": "15,600 บาท", "rationale": "ถูกต้อง! สูตรดอกเบี้ย = เงินต้น × อัตราดอกเบี้ย × (จำนวนเดือน ÷ 12) จะได้ ดอกเบี้ย = 15,000 × (6 ÷ 100) × (8 ÷ 12) = 600 บาท ดังนั้นเงินรวมที่ต้องจ่ายคืนคือ เงินต้น + ดอกเบี้ย = 15,000 + 600 = 15,600 บาท", "isCorrect": true },
        { "text": "15,450 บาท", "rationale": "ตัวลวงจากการคิดระยะเวลาผิดพลาด โดยนำ 8 เดือนไปคิดสัดส่วนครึ่งปี (6 เดือน)", "isCorrect": false },
        { "text": "19,000 บาท", "rationale": "ตัวลวงขนาดใหญ่ นำตัวเลขอัตราดอกเบี้ยร้อยละ 6 ไปคิดคำนวณผิดวิธีทำให้เงินต้นสูงขึ้นอย่างผิดปกติ", "isCorrect": false }
      ],
      "hint": "ระวัง! โจทย์กำหนดเวลาชำระคืนในเวลา 8 เดือน ไม่ใช่ 1 ปี ดอกเบี้ยต่อปีจึงต้องนำมาคูณกับเศษ 8 ส่วน 12 ก่อนนำไปบวกเข้ากับเงินต้น"
    },
    {
      "strand": "จำนวนและการดำเนินการ",
      "question": "ลุงพลมีที่ดินทำการเกษตรผสมผสาน ขุดสระน้ำไปเศษ 2 ส่วน 5 ของพื้นที่ทั้งหมด ปลูกพืชผักสวนครัวเศษ 1 ส่วน 4 ของพื้นที่ทั้งหมด ส่วนที่เหลือใช้สร้างโรงเรือนเลี้ยงไก่เนื้อไข่ คิดเป็นพื้นที่ 14 ไร่ อยากทราบว่าเดิมลุงพลมีที่ดินทำกินทั้งหมดกี่ไร่?",

        { "text": "ข้อ (1) และ (3) เท่านั้น", "rationale": "ถูกต้อง! ข้อ (1) โอกาสออกหัวหรือก้อยเท่ากันคือ 1/2 และข้อ (3) การหยิบสิ่งของที่ไม่มีอยู่จริงในกล่องย่อมมีโอกาสเป็น 0 (เหตุการณ์ที่เป็นไปไม่ได้) ส่วนข้อ (2) ผิดเพราะสภาวะอากาศมีความไม่แน่นอนสูง ไม่สามารถเคลมเป็นแน่นอน 100% ทางคณิตศาสตร์ได้", "isCorrect": true },
        { "text": "ข้อ (2) และ (3) เท่านั้น", "rationale": "ตัวลวงสับสน ยอมรับข้อผิดด้านความแน่นอนทางธรรมชาติ", "isCorrect": false },
        { "text": "ถูกต้องทุกข้อความ", "rationale": "ตัวลวงเหมารวม ขาดการพิจารณาเงื่อนไขความน่าจะเป็นในข้อสองอย่างถี่ถ้วน", "isCorrect": false }
      ],
      "hint": "ในหลักคณิตศาสตร์ เหตุการณ์ที่แน่นอนคือเกิดขึ้นแน่นอน ส่วนเหตุการณ์ธรรมชาติหรือการคาดเดาไม่ถือว่าแน่นอน 100% และสิ่งที่เป็นไปไม่ได้มีค่าความน่าจะเป็นคือศูนย์"
    }
  ]
};

function shuffleArray(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

let state = {
  isStarted: false,
  studentName: '',
  studentId: '',
  studentLevel: 'สกร. ระดับประถมศึกษา',
  questions: [],
  current: 0,
  answers: [],
  checked: []
};

function initQuiz() {
  let shuffled = shuffleArray([...quizData.questions]);
  shuffled = shuffled.map(q => {
    let opts = shuffleArray([...q.answerOptions]);
    return { ...q, answerOptions: opts };
  });
  state.questions = shuffled;
  state.current = 0;
  state.answers = new Array(shuffled.length).fill(null);
  state.checked = new Array(shuffled.length).fill(false);
}

function startQuiz() {
  const nameInput = document.getElementById('input-name').value.trim();
  const idInput = document.getElementById('input-id').value.trim();
  if (!nameInput || !idInput) {
    alert('⚠️ กรุณากรอกชื่อ-นามสกุล และรหัสนักศึกษาให้ครบถ้วนก่อนเริ่มทำข้อสอบครับ');
    return;
  }
  state.studentName = nameInput;
  state.studentId = idInput;
  state.isStarted = true;
  initQuiz();
  renderApp();
}

function renderApp() {
  const app = document.getElementById('quiz-app');
  if (!state.isStarted) {
    app.innerHTML = `
      <div class="card" style="animation: fadeIn 0.4s ease; text-align: center;">
        <div class="emoji-banner">📐 📊 🧮 ✏️ ➕</div>
        <h2 style="font-size: 18px; margin-bottom: 18px; color: var(--primary); font-weight: 700;">ลงทะเบียนเข้าทดสอบ N-NET วิชาคณิตศาสตร์</h2>
        <p style="font-size:14px; color: var(--text-muted); margin-bottom:20px;">ชุดที่ 5: ท้าทายทักษะกระบวนการคำนวณและการวิเคราะห์โจทย์ประยุกต์ชีวิตจริง</p>
        
        <div class="form-group">
          <label for="input-name">ชื่อ - นามสกุล ผู้เข้าสอบ *</label>
          <input type="text" id="input-name" class="form-control" placeholder="กรอกชื่อและนามสกุลของคุณ" required>
        </div>
        
        <div class="form-group">
          <label for="input-id">รหัสนักศึกษา สกร. *</label>
          <input type="text" id="input-id" class="form-control" placeholder="กรอกรหัสประจำตัวผู้เรียน" required>
        </div>
        
        <div class="form-group">
          <label>ระดับชั้น / หลักสูตร</label>
          <input type="text" class="form-control" value="${state.studentLevel}" disabled style="background-color: #f1f5f9; font-weight: 600; color: var(--primary-dark)">
        </div>
        
        <button class="btn btn-primary" onclick="startQuiz()" style="width: 100%; margin-top: 12px; font-size: 16px;">🧮 เริ่มทำแบบทดสอบ (ชุดที่ 5)</button>
      </div>
    `;
    return;
  }

  if (state.current >= state.questions.length) {
    renderSummary(app);
    return;
  }

  const q = state.questions[state.current];
  const pct = Math.round((state.current / state.questions.length) * 100);
  const selectedIdx = state.answers[state.current];
  const isChecked = state.checked[state.current];

  let hintHtml = q.hint ? `<div class="hint-box">💡 <b>แนวคิดทางคณิตศาสตร์:</b> ${q.hint}</div>` : '';
  
  let optionsHtml = q.answerOptions.map((opt, idx) => {
    let cls = 'option-item';
    if (selectedIdx === idx) cls += ' selected';
    if (isChecked) {
      cls += ' disabled';
      if (opt.isCorrect) cls += ' correct-reveal';
      else if (selectedIdx === idx) cls += ' wrong-reveal';
    }
    return `
      <div class="${cls}" onclick="selectAnswer(${idx})">
        <span class="radio-dot"></span>
        <div style="flex-grow:1;">${opt.text}</div>
      </div>
    `;
  }).join('');

  let feedbackHtml = '';
  if (isChecked && selectedIdx !== null) {
    const isCorrect = q.answerOptions[selectedIdx].isCorrect;
    const rationale = q.answerOptions[selectedIdx].rationale;
    feedbackHtml = `
      <div class="rationale-box ${isCorrect ? 'correct' : 'wrong'}">
        <b>${isCorrect ? '✨ ถูกต้อง! ถอดรหัสโจทย์สำเร็จ' : '❌ จุดลวงทางคณิตศาสตร์'}</b> — ${rationale}
      </div>
    `;
  }

  app.innerHTML = `
    <div class="card">
      <div class="progress-container">
        <span><b>ข้อที่ ${state.current + 1}</b> จาก ${state.questions.length}</span>
        <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <span>สาระ: <b>${q.strand}</b></span>
      </div>
      
      <div class="question-text">${q.question}</div>
      ${hintHtml}
      <div class="options-list">${optionsHtml}</div>
      ${feedbackHtml}

      <div class="nav-actions">
        <button class="btn btn-secondary" onclick="goPrev()" ${state.current === 0 ? 'disabled' : ''}>⬅️ ข้อก่อนหน้า</button>
        ${!isChecked ? 
          `<button class="btn btn-primary" onclick="checkAnswer()" ${selectedIdx === null ? 'disabled' : ''}>✔️ ส่งตรวจคำตอบ</button>` :
          `<button class="btn btn-primary" onclick="goNext()">${state.current === state.questions.length - 1 ? '🏁 ประมวลผลวิเคราะห์การเรียนรู้' : 'ข้อถัดไป ➡️'}</button>`
        }
      </div>
    </div>
  `;
}

function renderSummary(app) {
  let score = 0;
  let reviewHtml = '';
  let strandStats = {};

  state.questions.forEach((q, i) => {
    const userAnsIdx = state.answers[i];
    const isCorrect = userAnsIdx !== null && q.answerOptions[userAnsIdx].isCorrect;
    
    if (!strandStats[q.strand]) {
      strandStats[q.strand] = { total: 0, correct: 0 };
    }
    strandStats[q.strand].total++;
    
    if (isCorrect) {
      score++;
      strandStats[q.strand].correct++;
    }

    let correctOpt = q.answerOptions.find(o => o.isCorrect);
    let userOpt = userAnsIdx !== null ? q.answerOptions[userAnsIdx] : null;

    reviewHtml += `
      <div class="review-item">
        <div style="font-weight:600;margin-bottom:6px;color:var(--text)">ข้อ ${i+1} [${q.strand}]: ${q.question.replace(/\n/g, '<br>')}</div>
        <div style="color:${isCorrect ? 'var(--green)' : 'var(--red)'}; font-weight:600; font-size:14px;">
          ${isCorrect ? '🔹 ผลลัพธ์: ตอบถูกต้องตามหลักการคำนวณ' : `🔸 ผลลัพธ์: พลาดจุดลวง (คุณเลือก: ${userOpt ? userOpt.text : 'ไม่เลือกคำตอบ'})`}
        </div>
        <div style="color:var(--text-muted);font-size:13px;margin-top:4px;background:#f8fafc;padding:8px;border-radius:6px;">
          <b>💡 เฉลยละเอียดและวิธีคิดเชิงลึก:</b> ${correctOpt ? correctOpt.rationale : ''}
        </div>
      </div>
    `;
  });

  const pct = Math.round((score / state.questions.length) * 100);
  const isPass = pct >= 60;
  const grade = isPass ? "ผ่านเกณฑ์การคิดวิเคราะห์เชิงคำนวณขั้นสูง 🎓" : "ควรเพิ่มทักษะการตีความและถอดรหัสโจทย์ปัญหา 📘";
  const gc = isPass ? "grade-pass" : "grade-fail";

  let analysisItems = '';
  for (let strand in strandStats) {
    let stat = strandStats[strand];
    let sPct = Math.round((stat.correct / stat.total) * 100);
    if (sPct < 60) {
      analysisItems += `<div class="analysis-item"><b>สาระ${strand}:</b> ทำได้เพียง ${stat.correct}/${stat.total} ข้อ (${sPct}%) จุดบกพร่องคือการโดนตัวลวงสูตรลัดหรือการแปลงหน่วยวัด แนะนำให้ฝึกตั้งสมการและทบทวนนิยามมาตราส่วนเพิ่มเติมครับ</div>`;
    } else {
      analysisItems += `<div class="analysis-item" style="color:#166534"><b>สาระ${strand}:</b> ทำได้ดีเยี่ยม ${stat.correct}/${stat.total} ข้อ (${sPct}%) มีความเข้าใจในการประยุกต์ใช้คณิตศาสตร์ในชีวิตประจำวันเป็นอย่างดี</div>`;
    }
  }

  app.innerHTML = `
    <div class="card summary-card">
      <div style="font-size:40px;margin-bottom:8px;">🏆</div>
      <h2 style="font-size:22px; margin-bottom:4px; color: var(--primary); font-weight:700;">ใบรายงานผลคะแนนวิชาคณิตศาสตร์</h2>
      <div style="font-size:12px; color:var(--text-muted); margin-bottom:16px;">สถาบันส่งเสริมการเรียนรู้ (สกร.) ระดับประถมศึกษา</div>
      
      <div class="student-info-box">
        <p>👤 <b>ชื่อนักศึกษา:</b> ${state.studentName}</p>
        <p>🆔 <b>รหัสประจำตัว:</b> ${state.studentId}</p>
        <p>🏫 <b>ชุดข้อสอบ:</b> ${state.studentLevel} (ชุดที่ 5)</p>
      </div>

      <div style="font-size:16px;color:var(--text); margin-top:14px;">คำนวณถูกต้องรวม <b>${score}</b> ข้อ จากทั้งหมด <b>${state.questions.length}</b> ข้อ</div>
      <div style="margin:10px 0;"><span class="grade-pill ${gc}">${grade}</span></div>
      
      <div class="grid-stats">
        <div class="stat-box"><div class="stat-num" style="color:var(--green)">${score}</div><div class="slbl">คำนวณถูก (ข้อ)</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--red)">${state.questions.length - score}</div><div class="slbl">ตกหลุมลวง (ข้อ)</div></div>
        <div class="stat-box"><div class="stat-num" style="color:var(--primary)">${pct}%</div><div class="slbl">คะแนนรวมสุทธิ</div></div>
      </div>

      <div class="analysis-card">
        <div class="analysis-header">📊 รายงานวิเคราะห์ทักษะย้อนกลับรายสาระ (Learning Analytics)</div>
        ${analysisItems}
      </div>
      
      <p style="font-size:12px; color:var(--primary); font-weight:600; margin-bottom:18px; background:var(--primary-light); padding:6px; border-radius:6px;">📸 บันทึกหน้าจอนี้เพื่อส่งรายงานผลคะแนนและการวิเคราะห์ทักษะแก่ครูประจำกลุ่ม สกร.</p>
      
      <button class="btn btn-primary" onclick="restartQuiz()" style="width:100%">🔄 ทำแบบทดสอบใหม่อีกครั้ง (สุ่มและสลับโจทย์ใหม่)</button>
    </div>
    
    <div class="card" style="margin-top:6px;">
      <div class="review-title">📋 สรุปวิธีคิดและบทวิเคราะห์ตัวลวงเชิงลึกประจำชุดที่ 5</div>
      ${reviewHtml}
    </div>
  `;
}

function selectAnswer(i) { if (!state.checked[state.current]) { state.answers[state.current] = i; renderApp(); } }
function checkAnswer()   { if (state.answers[state.current] !== null) { state.checked[state.current] = true; renderApp(); } }
function goNext()        { state.current++; renderApp(); }
function goPrev()        { if (state.current > 0) { state.current--; renderApp(); } }
function restartQuiz()   { state.isStarted = false; renderApp(); }

renderApp();
</script>
</body>
</html>
